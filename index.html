    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Orbitron:wght@600;700;800;900&family=Poppins:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=coins-stores" />
    <title>COINS STORES</title>
    <script>
      (function () {
        try {
          var theme = window.localStorage.getItem('coins-stores-theme');
          var safeTheme = theme === 'light' || theme === 'dark' ? theme : 'dark';
          document.documentElement.classList.toggle('dark', safeTheme === 'dark');
          document.documentElement.dataset.theme = safeTheme;
        } catch (error) {
          document.documentElement.classList.add('dark');
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <style>
      #app-boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 50% 45%, rgb(212 164 45 / 0.18), transparent 52%),
          radial-gradient(circle at 10% 0%, rgb(29 149 168 / 0.14), transparent 35%),
          linear-gradient(180deg, #071316 0%, #03080a 100%);
        transition: opacity 240ms ease, visibility 240ms ease;
      }

      #app-boot-loader.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .boot-loader__logo {
        width: clamp(90px, 19vw, 132px);
        height: clamp(90px, 19vw, 132px);
        object-fit: contain;
        animation: boot-logo-motion 1.7s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        filter: drop-shadow(0 10px 24px rgb(212 164 45 / 0.38));
      }

      @keyframes boot-logo-motion {
        0% {
          transform: translateY(0) rotate(0deg) scale(0.985);
        }

        50% {
          transform: translateY(-4px) rotate(180deg) scale(1);
        }

        100% {
          transform: translateY(0) rotate(360deg) scale(0.985);
        }
      }

    </style>
  </head>
  <body>
    <div id="app-boot-loader" aria-hidden="true">
      <img class="boot-loader__logo" src="/src/assets/logo.webp" alt="COINS STORES" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
